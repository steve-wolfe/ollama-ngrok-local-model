# Proxy (normalizes Cursor request: input→messages, content) + ngrok. Ollama on host or alias models.
services:
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: ollama-proxy
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_UPSTREAM=http://host.docker.internal:11434
      - PORT=8080
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok
    command: http proxy:8080
    env_file:
      - .env
    depends_on:
      - proxy
    restart: unless-stopped
